name: Build and Deploy to ECS

on:
  push:
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  AWS_REGION: us-east-1
  ECS_CLUSTER: vehicle-data-logger
  ECS_SERVICE: vehicle-data-tasks-service-9mv1xveq
  DESIRED_TASKS: 1 # Change this to increase/decrease running containers
jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/vehicle-data-fd:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/vehicle-data-fd:${{ github.sha }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/vehicle-data-bd:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/vehicle-data-bd:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force New Deployment in ECS
        run: |
          echo "Updating ECS Service to pull new latest images and setting desired tasks to ${{ env.DESIRED_TASKS }}..."
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --desired-count ${{ env.DESIRED_TASKS }} --force-new-deployment
